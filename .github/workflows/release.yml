name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build plugin
        run: pnpm run build

      - name: Validate release version
        run: |
          tag="${GITHUB_REF_NAME}"

          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tag must use vX.Y.Z format. Received: $tag"
            exit 1
          fi

          version="${tag#v}"

          package_version="$(node -p "require('./package.json').version")"
          manifest_version="$(node -p "require('./manifest.json').version")"

          if [ "$package_version" != "$version" ]; then
            echo "package.json version ($package_version) does not match tag version ($version)."
            exit 1
          fi

          if [ "$manifest_version" != "$version" ]; then
            echo "manifest.json version ($manifest_version) does not match tag version ($version)."
            exit 1
          fi

      - name: Package release assets
        run: |
          tag="${GITHUB_REF_NAME}"
          plugin_id="video-to-obsidian"
          package_dir="dist/$plugin_id"
          zip_name="$plugin_id-$tag.zip"

          test -f main.js
          test -f manifest.json
          test -f styles.css

          rm -rf dist
          mkdir -p "$package_dir"
          cp main.js manifest.json styles.css "$package_dir/"

          (cd dist && zip -r "$zip_name" "$plugin_id")

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"

          gh release create "$tag" \
            --generate-notes \
            main.js \
            manifest.json \
            styles.css \
            "dist/video-to-obsidian-$tag.zip"
